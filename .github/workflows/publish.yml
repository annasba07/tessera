name: publish

# Auto-publish to PyPI when a tag matching v*.*.* is pushed.
# Uses PyPI Trusted Publisher (OIDC) — no API token in repo secrets.
#
# To cut a release:
#   1. Bump version in tessera/pyproject.toml + tessera/src/tessera/__init__.py
#   2. git commit -am "0.x.y" && git push
#   3. git tag -a v0.x.y -m "0.x.y" && git push --tags
#   4. This workflow builds + publishes automatically.
#
# Trusted publisher must be configured at:
# https://pypi.org/manage/project/tessera-agents/settings/publishing/
#   Owner:      annasba07
#   Repository: tessera
#   Workflow:   publish.yml
#   Environment: pypi

on:
  push:
    tags:
      - "v*.*.*"
  # Also allow manual trigger for republishing a tag from the GH UI
  workflow_dispatch:

jobs:
  build-and-publish:
    name: Build and publish tessera-agents to PyPI
    runs-on: ubuntu-latest
    # GitHub Environment with the 'pypi' name — gives an extra deploy
    # gate and isolates publish creds from PR/branch builds.
    environment:
      name: pypi
      url: https://pypi.org/project/tessera-agents/
    permissions:
      # Required for PyPI Trusted Publisher OIDC token exchange.
      id-token: write
    defaults:
      run:
        working-directory: tessera
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade build twine

      - name: Verify tag matches pyproject version
        # Tag is v0.4.2 → strip the leading 'v' → must match pyproject [project].version.
        # Catches the "I tagged but forgot to bump the source" mistake before publishing.
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PYPROJ=$(python -c "import tomllib,sys; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG" != "$PYPROJ" ]; then
            echo "::error::Tag $GITHUB_REF_NAME (=$TAG) does not match pyproject version $PYPROJ"
            exit 1
          fi
          echo "✓ Tag and pyproject both at version $TAG"

      - name: Run tests
        run: |
          python -m pip install -e ".[dev]"
          python -m pytest -q

      - name: Build sdist + wheel
        run: |
          rm -rf dist
          python -m build

      - name: Validate built distributions
        run: python -m twine check dist/*

      - name: Publish to PyPI via Trusted Publisher
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: tessera/dist
